steps:
  - name: test-api
    image: oven/bun:1-alpine
    commands:
      - cd api
      - bun install
      - bun run test
    when:
      - event: [push, pull_request]

  - name: test-web
    image: oven/bun:1-alpine
    commands:
      - cd web
      - bun install
      #- bun run typecheck
      - bun run test
    when:
      - event: [push, pull_request]

  - name: build-and-push-api
    image: docker:cli
    volumes:
      - /run/user/1010/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_URL:
        from_secret: REGISTRY_URL
      REGISTRY_USER:
        from_secret: REGISTRY_USER
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
    commands:
      - docker login $REGISTRY_URL -u $REGISTRY_USER -p $REGISTRY_PASSWORD
      - docker build --target prod -t $REGISTRY_URL/innebandylab-api:latest -t $REGISTRY_URL/innebandylab-api:${CI_COMMIT_SHA} ./api
      - docker push $REGISTRY_URL/innebandylab-api:latest
      - docker push $REGISTRY_URL/innebandylab-api:${CI_COMMIT_SHA}
    when:
      - event: push
        branch: main

  - name: build-and-push-web
    image: docker:cli
    volumes:
      - /run/user/1010/docker.sock:/var/run/docker.sock
    environment:
      REGISTRY_URL:
        from_secret: REGISTRY_URL
      REGISTRY_USER:
        from_secret: REGISTRY_USER
      REGISTRY_PASSWORD:
        from_secret: REGISTRY_PASSWORD
    commands:
      - docker login $REGISTRY_URL -u $REGISTRY_USER -p $REGISTRY_PASSWORD
      - docker build --no-cache --target prod -t $REGISTRY_URL/innebandylab-web:latest -t $REGISTRY_URL/innebandylab-web:${CI_COMMIT_SHA} ./web
      - docker push $REGISTRY_URL/innebandylab-web:latest
      - docker push $REGISTRY_URL/innebandylab-web:${CI_COMMIT_SHA}
    when:
      - event: push
        branch: main

  - name: deploy
    image: alpine
    environment:
      DEPLOY_HOST:
        from_secret: DEPLOY_HOST
      DEPLOY_USER:
        from_secret: DEPLOY_USER
      DEPLOY_KEY:
        from_secret: DEPLOY_KEY
    commands:
      - apk add --no-cache openssh-client
      - mkdir -p ~/.ssh
      - printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - cat -A ~/.ssh/id_ed25519 | head -5
      - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
      - ssh -i ~/.ssh/id_ed25519 $DEPLOY_USER@$DEPLOY_HOST "cd /opt/innebandylab && docker compose pull api web && docker compose up -d --no-deps api web"
    when:
      - event: push
        branch: main